<!DOCTYPE html>
<html>

<head>
    <style>
        .wcag_greyscale_1 {
            --_primitive-collection---purple_color: #595959;
            --_primitive-collection---purple_v2: #b0b0b0;
            --_primitive-collection---purple_lighter: #6c6c6c;
            --_primitive-collection---purple_color_alpha: #666666;
            --_primitive-collection---yellow_66: #a8a8a8;
            --_primitive-collection---orange_57: #919191;
            --_primitive-collection---orange_2: #a3a3a3;
            --_primitive-collection---blue_turquaise: #646464;

            --_theme-collection---color_primary_1: var(--_primitive-collection---yellow_66);
            --_theme-collection---color_primary_2: var(--_primitive-collection---orange_2);
            --_theme-collection---color_primary_3: var(--_primitive-collection---blue_turquaise);
            --_theme-collection---color_primary_4: var(--_primitive-collection---purple_v2);
        }

        .wcag_greyscale_1 img {
            filter: grayscale(100%);
        }

        .wcag_font_dislexia_1 {
            --_fonts-collection---font_normal: var(--_primitive-collection---dislexia_font);
        }

        .wcag_font_size_1 {
            --bigger_text_offset: 10px;
            --_theme-collection---font_size_xs: calc(13px + var(--bigger_text_offset));
            --_theme-collection---font_line_height_xs: calc(17px + var(--bigger_text_offset));

            --_theme-collection---font_size_s: calc(16px + var(--bigger_text_offset));
            --_theme-collection---font_line_height_s: calc(20px + var(--bigger_text_offset));

            --_theme-collection---font_size_ms: calc(23px + var(--bigger_text_offset));
            --_theme-collection---font_line_height_ms: calc(29px + var(--bigger_text_offset));

            --_theme-collection---font_size_m: calc(27px + var(--bigger_text_offset));
            --_theme-collection---font_line_height_m: calc(35px + var(--bigger_text_offset));

            --_theme-collection---font_size_l: calc(40px + var(--bigger_text_offset));
            --_theme-collection---font_line_height_l: calc(44px + var(--bigger_text_offset));

            --_theme-collection---font_size_xl: calc(50px + var(--bigger_text_offset));
            --_theme-collection---font_line_height_xl: calc(50px + var(--bigger_text_offset));


            --_theme-collection---mobile_font_size_xs: calc(13px + var(--bigger_text_offset));
            --_theme-collection---mobile_font_line_height_xs: calc(17px + var(--bigger_text_offset));

            --_theme-collection---mobile_font_size_s: calc(16px + var(--bigger_text_offset));
            --_theme-collection---mobile_font_line_height_s: calc(20px + var(--bigger_text_offset));

            --_theme-collection---mobile_font_size_m: calc(20px + var(--bigger_text_offset));
            --_theme-collection---mobile_font_line_height_m: calc(31px + var(--bigger_text_offset));

            --_theme-collection---mobile_font_size_l: calc(40px + var(--bigger_text_offset));
            --_theme-collection---mobile_font_line_height_l: calc(44px + var(--bigger_text_offset));

            --_theme-collection---mobile_font_size_xl: calc(36px + var(--bigger_text_offset));
            --_theme-collection---mobile_font_line_height_xl: calc(44px + var(--bigger_text_offset));
        }

        .wcag_focus_highlight_1 *:focus {
            outline: none;
        }

        .wcag_focus_highlight_1 *:focus-visible {
            outline: 3px solid #005fcc;
            outline-offset: 4px;
            border-radius: 2px;
            box-shadow: 0 0 0 6px rgba(0, 95, 204, 0.3);
        }

        .skip-link {
            position: absolute;
            left: -100vw;
        }

        .skip-link:focus {
            position: static;
        }

        [wcag-menu-item]>* {
            display: inline;
            -webkit-user-select: none;
            user-select: none;
        }

        [wcag-menu-item][wcag-used="0"]>[wcag-value="0"] {
            display: none;
        }

        [wcag-menu-item][wcag-used="1"]>[wcag-value="1"] {
            display: none;
        }

        [wcag-menu-item][wcag-used="2"]>[wcag-value="2"] {
            display: none;
        }
    </style>
    <script>
        // Accesibility
        // Text to Speech
        let lastElement = null;
        let lastWasTab = false;
        let synth;
        let previousKey = null;
        document.addEventListener('keydown', (e) => {
            lastWasTab = (['Enter', 'Tab'].indexOf(e.key) >= 0);
            previousKey = event.key;
        });
        function enableTabAutoRead(options = {}) {
            const {
                lang = 'en-US',
                rate = 1,
                pitch = 1,
                volume = 1,
                debug = false
            } = options;

            synth = window.speechSynthesis;

            function getReadableText(el) {
                if (!el) return '';
                const role = el.getAttribute('role') ||
                    el.tagName == "A" ? 'link' : '' ||
                        el.tagName == "BUTTON" ? 'button' : ''
                    ;
                // Priority: aria-label > innerText > value > alt > title
                const label = (
                    el.getAttribute('aria-label') ||
                    el.innerText ||
                    el.value ||
                    el.getAttribute('alt') ||
                    el.getAttribute('title') ||
                    ''
                ).trim();
                return role ? `${role}: ${label}` : label;
            }

            function speak(text) {
                if (!text) return;

                // Cancel previous speech to avoid overlap
                synth.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = rate;
                utterance.pitch = pitch;
                utterance.volume = volume;

                synth.speak(utterance);

                if (debug) console.log('🔊 Speaking:', text);
            }

            function handleFocus(event) {
                if (!lastWasTab) return;
                lastWasTab = false;
                if (event.target === lastElement) return;
                lastElement = event.target;
                const el = event.target;
                const text = getReadableText(el);

                if (debug) console.log('Focus on:', el, 'Text:', text);

                speak(text);
            }

            document.addEventListener('focusin', handleFocus);

            // Return a cleanup function
            return () => {
                document.removeEventListener('focusin', handleFocus);
                synth.cancel();
            };
        }

        const LANG_MAP = {
            '': 'en-US',
            'es-mx': 'es-ES',
        };
        const keyLang = /\/([^\/]*)$/.exec(location.pathname)[1];
        let disableTTS = null;
        // Accesibility menu activation
        document.addEventListener("DOMContentLoaded", function () {
            const elements = document.querySelectorAll('[wcag-menu-item]');
            elements.forEach((el, index) => {
                const wcagClass = el.getAttribute('data-wcag-class');
                el.setAttribute('tabindex', '-1');
                // Handle function
                const useValue = (val, wcagClass) => {
                    // Visual feedback on menu
                    el.setAttribute('wcag-used', val);

                    // Apply in document
                    if (wcagClass == "wcag_tts") {
                        if (val == "1") {
                            disableTTS = enableTabAutoRead({
                                lang: LANG_MAP[keyLang],
                                rate: 1.1,
                                debug: false
                            });
                        } else {
                            if (disableTTS != null) {
                                disableTTS();
                                disableTTS = null;
                            }
                        }
                    }
                    const body = document.querySelectorAll('body')[0];
                    Array.from(body.classList).forEach((cls) => {
                        if (cls.startsWith(wcagClass)) {
                            body.classList.remove(cls);
                        }
                    });
                    body.classList.add(`${wcagClass}_${val}`);
                };
                el.setAttribute('wcag-used', "0");
                Array.from(el.children).forEach((child) => {
                    const val = child.getAttribute('wcag-value');
                    if (!child.hasAttribute('tabindex')) {
                        child.setAttribute('tabindex', '0');
                    }
                    child.addEventListener('click', () => {
                        useValue(val, wcagClass);
                    });
                    // Keyboard listener (Enter key)
                    child.addEventListener('keydown', (event) => {
                        if (event.key === 'Enter') {
                            event.preventDefault();
                            useValue(val, wcagClass);
                        }
                    });
                });
            });
        });
    </script>
    <script>
        const ENV_ALL = {
            "dev": {
                "endpoint": "http://localhost:8081"
            },
            "stg": {
                "endpoint": "https://stg-assessment-284609972807.us-central1.run.app"
            },
            "pro": {
                "endpoint": "https://pro-assessment-284609972807.us-central1.run.app"
            },
        };
        const env = ENV_ALL["stg"];

        function configureContactUsForm() {
            const parentForm = document.getElementById('contact-us-form');
            if (!parentForm) {
                return;
            }

            const form = parentForm.querySelector("form");
            if (!form) {
                return;
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const formData = new FormData(form);
                const formDataFields = Object.fromEntries(formData.entries());
                const payload = {
                    //debug: 1,
                    source: "bucket-private",
                    body: {
                        to: ["edgar.jose.fernando.delgado@gmail.com"],
                        //template: "/assets/templates/mails/test.html",
                        template: "email/contact_us.html",
                        subject: "This is my subject",
                        params: {
                            data: {
                                title: "This is my title",
                                content: "This is my content"
                            },
                            form: formDataFields,
                        },
                    }
                };

                try {
                    const res = await fetch(`${env.endpoint}/srv/email/send`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(payload),
                    });

                    console.log(res);

                    if (!res.ok) throw new Error("Request failed");

                    // Show Webflow success message
                    form.style.display = "none";
                    document.querySelector(".w-form-done").style.display = "block";
                } catch (err) {
                    document.querySelector(".w-form-fail").style.display = "block";
                    console.error(err);
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            configureContactUsForm();
        });
    </script>
</head>

<body>
    <form>
        <button type="submit">Send</button>
    </form>
</body>

</html>
